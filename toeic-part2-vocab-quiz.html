<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOEIC Vocabulary Practice – Flashcards & Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--orange:#e8590c;--orange2:#ff922b;--bg:#fff8f2;--line:#ffd0b5;--dark:#212529;--muted:#667085;--green:#2f9e44;--greenbg:#ebfbee;--red:#c92a2a;--redbg:#fff5f5;--blue:#1971c2;--card:#fff;--shadow:0 8px 28px rgba(232,89,12,.13);--r:18px;--r2:24px}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;padding-bottom:86px}
  .hero{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;text-align:center;padding:26px 18px 24px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;right:-40px;top:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.12)}
  .hero h1{font-size:22px;font-weight:900;line-height:1.25;margin-bottom:5px}.hero p{font-size:13px;font-weight:700;opacity:.9}
  .progress{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.06);padding:12px 16px;display:flex;gap:12px;align-items:center}.progress span{font-size:12px;font-weight:800;color:var(--orange);white-space:nowrap}.bar{flex:1;height:8px;background:#ffe4d1;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));width:0%;transition:.35s}
  .modes{display:flex;justify-content:center;gap:9px;flex-wrap:wrap;padding:15px 12px 0}.mode{border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:8px 16px;font-family:inherit;font-weight:900;font-size:13px;cursor:pointer}.mode.active{background:var(--orange);border-color:var(--orange);color:#fff}.mode:hover{border-color:var(--orange);color:var(--orange)}.mode.active:hover{color:#fff}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:13px 16px 0;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-family:inherit;font-size:12px;font-weight:900;color:var(--muted);cursor:pointer}.tab.active{background:#fff0e6;color:var(--orange);border-color:var(--orange)}
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px}.counter{text-align:center;font-weight:900;color:var(--muted);font-size:13px;margin-bottom:12px}
  .scene{perspective:1200px;cursor:pointer}.inner{height:310px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:var(--r2)}.scene.flipped .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#fff;border:1.5px solid var(--line);border-radius:var(--r2);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;text-align:center;padding:28px;overflow:hidden}.front{background:linear-gradient(180deg,#fff,#fffaf6)}.front.learned{background:var(--greenbg);border-color:var(--green)}.word{font-size:34px;line-height:1.18;font-weight:900;color:var(--orange);word-break:break-word}.learned .word{color:var(--green)}.hint{margin-top:18px;color:#adb5bd;font-weight:800;font-size:12px}.badge{display:none;margin-bottom:12px;background:var(--green);color:#fff;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:900}.learned .badge{display:inline-block}.back{transform:rotateY(180deg);background:#fffaf5;display:block;text-align:left}.back-grid{height:100%;display:grid;grid-template-columns:1fr;align-content:center;gap:13px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--orange);font-weight:900}.meaning{font-size:24px;font-weight:900;line-height:1.25}.note{font-size:14px;color:var(--muted);font-weight:700;background:#fff;border-left:4px solid var(--orange2);border-radius:12px;padding:9px 12px}.example{font-size:15px;color:var(--blue);font-weight:800;font-style:italic;line-height:1.45}.nav{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:18px}.circle{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--orange);font-size:26px;font-weight:900;cursor:pointer}.circle:disabled{opacity:.35;cursor:default}.learn{flex:1;border:0;border-radius:999px;padding:13px 16px;font-family:inherit;font-weight:900;color:#fff;background:var(--green);cursor:pointer}.learn.yes{background:var(--red)}
  .quiz-card,.score,.match-card{background:#fff;border:1.5px solid var(--line);border-radius:var(--r2);box-shadow:var(--shadow);padding:24px;margin-bottom:16px}.quiz-top{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:900;margin-bottom:14px}.pill{background:var(--orange);color:#fff;border-radius:999px;padding:4px 12px}.q-label{text-align:center;text-transform:uppercase;color:#adb5bd;font-size:12px;font-weight:900;letter-spacing:.8px}.q-word{text-align:center;font-size:27px;color:var(--orange);font-weight:900;margin:8px 0}.q-example{text-align:center;color:var(--blue);font-size:14px;font-weight:800;font-style:italic}.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opt{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;text-align:left;line-height:1.35;font-family:inherit;font-weight:800;cursor:pointer;color:var(--dark)}.opt:hover:not(:disabled){background:#fff4ec;border-color:var(--orange)}.opt.correct{background:var(--greenbg);border-color:var(--green);color:var(--green)}.opt.wrong{background:var(--redbg);border-color:var(--red);color:var(--red)}.feedback{display:none;margin:14px 0;border-radius:16px;padding:12px 14px;font-weight:900;line-height:1.45}.feedback.show{display:block}.feedback.correct{background:var(--greenbg);color:var(--green)}.feedback.wrong{background:var(--redbg);color:var(--red)}.next,.retry{width:100%;display:none;border:0;border-radius:16px;background:var(--orange);color:#fff;padding:13px;font-family:inherit;font-weight:900;font-size:15px;cursor:pointer}.next.show{display:block}.score{text-align:center;padding:34px 24px}.score h2{font-size:24px;color:var(--orange);margin-bottom:12px}.score-num{font-size:46px;font-weight:900;color:var(--orange)}.retry{display:inline-block;width:auto;border-radius:999px;margin-top:18px;padding:12px 26px}
  .match-title{text-align:center;margin-bottom:16px}.match-title h3{color:var(--orange);font-size:18px;font-weight:900}.match-title p{font-size:13px;color:var(--muted);font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.col{display:flex;flex-direction:column;gap:10px}.item{min-height:54px;display:flex;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:12px 14px;font-weight:850;line-height:1.3;cursor:pointer}.item.worditem{color:var(--orange)}.item:hover:not(.matched){background:#fff4ec;border-color:var(--orange)}.item.selected{box-shadow:0 0 0 3px rgba(232,89,12,.18);border-color:var(--orange);background:#fff0e6}.item.matched{background:var(--greenbg);border-color:var(--green);color:var(--green);cursor:default;opacity:.82}.item.flash{background:var(--redbg);border-color:var(--red)}.match-complete{display:none;margin-top:16px;text-align:center;background:var(--greenbg);border:1.5px solid var(--green);border-radius:var(--r);padding:18px;color:var(--green);font-weight:900}.match-complete.show{display:block}.reset{margin-top:16px;text-align:center}.reset button{border:1.5px solid var(--orange);background:#fff;color:var(--orange);border-radius:999px;padding:10px 24px;font-family:inherit;font-weight:900;cursor:pointer}
  .stats{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);box-shadow:0 -3px 14px rgba(0,0,0,.07);display:flex;justify-content:center;gap:38px;padding:12px 10px;z-index:60}.stat{text-align:center}.num{font-size:18px;font-weight:900;color:var(--orange)}.num.green{color:var(--green)}.stat div:last-child{font-size:10px;text-transform:uppercase;color:#adb5bd;font-weight:900;letter-spacing:.5px}
  @media(max-width:620px){.hero h1{font-size:19px}.inner{height:280px}.word{font-size:30px}.face{padding:22px}.meaning{font-size:20px}.opts,.grid{grid-template-columns:1fr}.stats{gap:28px}.wrap{padding-top:18px}}
</style>
</head>
<body>
  <header class="hero"><h1>TOEIC Vocabulary Practice</h1><p>Flashcards 2 mặt • Quiz trắc nghiệm • Nối từ</p></header>
  <div class="progress"><span>Đã thuộc</span><div class="bar"><div class="fill" id="fill"></div></div><span id="progressText">0 / 33</span></div>
  <div class="modes">
    <button class="mode active" id="btnCards" onclick="switchMode('cards')">Flashcard</button>
    <button class="mode" id="btnQuiz" onclick="switchMode('quiz')">Quiz</button>
    <button class="mode" id="btnMatch" onclick="switchMode('match')">Nối từ</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <main id="cards" class="wrap">
    <div class="counter" id="counter"></div>
    <section class="scene" id="scene" onclick="flipCard()"><div class="inner">
      <div class="face front" id="front"><div><div class="badge">✓ ĐÃ THUỘC</div><div class="word" id="word"></div><div class="hint">Nhấn để xem nghĩa + ví dụ</div></div></div>
      <div class="face back"><div class="back-grid"><div><div class="label">Nghĩa tiếng Việt</div><div class="meaning" id="meaning"></div></div><div class="note" id="note"></div><div><div class="label">Ví dụ</div><div class="example" id="example"></div></div></div></div>
    </div></section>
    <div class="nav"><button class="circle" id="prev" onclick="event.stopPropagation();moveCard(-1)">‹</button><button class="learn" id="learnBtn" onclick="event.stopPropagation();toggleLearned()">✓ Đã thuộc</button><button class="circle" id="next" onclick="event.stopPropagation();moveCard(1)">›</button></div>
  </main>
  <main id="quiz" class="wrap" style="display:none"></main>
  <main id="match" class="wrap" style="display:none"></main>
  <footer class="stats"><div class="stat"><div class="num" id="total">33</div><div>Tổng</div></div><div class="stat"><div class="num green" id="learnedNum">0</div><div>Đã thuộc</div></div><div class="stat"><div class="num" id="leftNum">33</div><div>Còn lại</div></div></footer>
<script>
const VOCAB = [
{id:1,g:1,gn:'Travel & Places',w:'drove',m:'đã lái xe',n:'Quá khứ của drive.',e:'She drove to the office this morning.'},
{id:2,g:1,gn:'Travel & Places',w:'basket',m:'cái giỏ, rổ',n:'Dùng để đựng đồ, thức ăn hoặc hàng hóa.',e:'Please put the fruit in the basket.'},
{id:3,g:1,gn:'Travel & Places',w:'umbrella',m:'cái ô, dù',n:'Dùng khi trời mưa hoặc nắng.',e:'I forgot to bring my umbrella.'},
{id:4,g:1,gn:'Travel & Places',w:'Bistro',m:'quán ăn nhỏ, nhà hàng nhỏ',n:'Thường là quán ăn nhỏ, không quá trang trọng.',e:'We had lunch at a small bistro near the station.'},
{id:5,g:1,gn:'Travel & Places',w:'make reservation',m:'đặt chỗ',n:'Thường dùng với nhà hàng, khách sạn hoặc chuyến bay.',e:'I would like to make a reservation for two people.'},
{id:6,g:1,gn:'Travel & Places',w:'continental breakfast',m:'bữa sáng kiểu Âu nhẹ',n:'Thường gồm bánh mì, cà phê, nước trái cây, trái cây.',e:'The hotel offers a continental breakfast every morning.'},
{id:7,g:1,gn:'Travel & Places',w:'on the corner',m:'ở góc đường / góc phố',n:'Dùng để mô tả vị trí.',e:'The pharmacy is on the corner of Pine Street.'},
{id:8,g:1,gn:'Travel & Places',w:'avenue',m:'đại lộ',n:'Một con đường lớn trong thành phố.',e:'The office is located on Riverside Avenue.'},
{id:9,g:2,gn:'Objects & Clothes',w:'locker',m:'tủ khóa cá nhân',n:'Thường dùng ở trường học, phòng gym, nơi làm việc.',e:'You can leave your bag in the locker.'},
{id:10,g:2,gn:'Objects & Clothes',w:'sock',m:'tất, vớ',n:'Một chiếc tất; a pair of socks = một đôi tất.',e:'He found a sock under the bed.'},
{id:11,g:2,gn:'Objects & Clothes',w:'hook',m:'cái móc, móc treo',n:'Dùng để treo quần áo, túi hoặc đồ vật.',e:'Hang your coat on the hook by the door.'},
{id:12,g:2,gn:'Objects & Clothes',w:'jewelry',m:'trang sức',n:'Danh từ không đếm được trong tiếng Anh.',e:'The store sells handmade jewelry.'},
{id:13,g:2,gn:'Objects & Clothes',w:'a pair of earrings',m:'một đôi bông tai',n:'A pair of + danh từ số nhiều.',e:'She bought a pair of earrings for the ceremony.'},
{id:14,g:2,gn:'Objects & Clothes',w:'packet',m:'gói nhỏ, tập tài liệu nhỏ',n:'Có thể là gói hàng nhỏ hoặc tập giấy tờ.',e:'Each participant received an information packet.'},
{id:15,g:2,gn:'Objects & Clothes',w:'handouts',m:'tài liệu phát tay',n:'Tài liệu được phát cho người học hoặc người tham dự.',e:'The trainer prepared handouts for the workshop.'},
{id:16,g:3,gn:'Events & Services',w:'safety training certificate',m:'chứng chỉ đào tạo an toàn',n:'Giấy chứng nhận đã hoàn thành khóa huấn luyện an toàn.',e:'Workers must show a safety training certificate before entering the site.'},
{id:17,g:3,gn:'Events & Services',w:'floral arrangements',m:'các mẫu / phần trang trí hoa',n:'Hoa được sắp xếp để trang trí sự kiện.',e:'The florist delivered the floral arrangements before noon.'},
{id:18,g:3,gn:'Events & Services',w:'award ceremony',m:'lễ trao giải',n:'Sự kiện trao giải thưởng hoặc vinh danh.',e:'The award ceremony will begin at 7 p.m.'},
{id:19,g:3,gn:'Events & Services',w:'a charge of',m:'một khoản phí là',n:'Dùng khi nói về phí dịch vụ hoặc chi phí.',e:'There is a charge of ten dollars for expedited delivery.'},
{id:20,g:3,gn:'Events & Services',w:'expedited delivery',m:'giao hàng nhanh',n:'Dịch vụ giao hàng nhanh hơn bình thường.',e:'We requested expedited delivery for the documents.'},
{id:21,g:3,gn:'Events & Services',w:'the reception desk',m:'quầy lễ tân',n:'Nơi khách hỏi thông tin hoặc đăng ký.',e:'Please leave your key at the reception desk.'},
{id:22,g:3,gn:'Events & Services',w:'registration',m:'sự đăng ký, việc ghi danh',n:'Dùng cho sự kiện, khóa học, hội thảo.',e:'Registration for the seminar closes on Friday.'},
{id:23,g:4,gn:'Work & Career',w:'sales associate',m:'nhân viên bán hàng',n:'Thường làm việc trong cửa hàng hoặc bộ phận bán hàng.',e:'A sales associate helped me find the right size.'},
{id:24,g:4,gn:'Work & Career',w:'pursue a career',m:'theo đuổi một sự nghiệp',n:'Dùng khi nói về định hướng nghề nghiệp.',e:'She wants to pursue a career in marketing.'},
{id:25,g:4,gn:'Work & Career',w:'job fair',m:'hội chợ việc làm',n:'Nơi công ty gặp ứng viên và tuyển dụng.',e:'Several companies will attend the job fair.'},
{id:26,g:4,gn:'Work & Career',w:'inspiring',m:'truyền cảm hứng',n:'Mô tả người, bài nói, câu chuyện hoặc sự kiện tạo động lực.',e:'The speaker gave an inspiring presentation.'},
{id:27,g:4,gn:'Work & Career',w:'database',m:'cơ sở dữ liệu',n:'Nơi lưu trữ thông tin có hệ thống.',e:'The customer information is stored in a database.'},
{id:28,g:4,gn:'Work & Career',w:'warehouse',m:'nhà kho',n:'Nơi lưu trữ hàng hóa trước khi bán hoặc vận chuyển.',e:'The products are kept in a warehouse outside the city.'},
{id:29,g:5,gn:'Business & Descriptions',w:'certain',m:'chắc chắn; một số nhất định',n:'Nghĩa phụ thuộc ngữ cảnh.',e:'Certain employees need to attend the meeting.'},
{id:30,g:5,gn:'Business & Descriptions',w:'renovated',m:'đã được cải tạo, sửa mới',n:'Dùng cho nhà, văn phòng, khách sạn, phòng ốc.',e:'The renovated lobby looks much brighter.'},
{id:31,g:5,gn:'Business & Descriptions',w:'coming along',m:'đang tiến triển',n:'Dùng để hỏi hoặc nói về tiến độ.',e:'How is the new project coming along?'},
{id:32,g:5,gn:'Business & Descriptions',w:'marked down',m:'được giảm giá',n:'Thường dùng trong cửa hàng.',e:'These jackets have been marked down by 30 percent.'},
{id:33,g:5,gn:'Business & Descriptions',w:'budget surplus',m:'thặng dư ngân sách',n:'Khi thu nhiều hơn chi trong ngân sách.',e:'The department reported a budget surplus this year.'}
];
let learned=new Set(), idx=0, tab=0, mode='cards', quiz=[], qi=0, score=0, selected=null, matched=0;
function list(){return tab===0?VOCAB:VOCAB.filter(x=>x.g===tab)}
function shuffle(a){return a.slice().sort(()=>Math.random()-.5)}
function update(){let t=VOCAB.length,l=learned.size;document.getElementById('fill').style.width=(l/t*100)+'%';document.getElementById('progressText').textContent=`${l} / ${t}`;document.getElementById('total').textContent=t;document.getElementById('learnedNum').textContent=l;document.getElementById('leftNum').textContent=t-l}
function buildTabs(){let groups=[];VOCAB.forEach(v=>{if(!groups.find(g=>g.id===v.g))groups.push({id:v.g,name:v.gn})});document.getElementById('tabs').innerHTML=`<button class="tab active" onclick="setTab(0,this)">Tất cả</button>`+groups.map(g=>`<button class="tab" onclick="setTab(${g.id},this)">${g.name}</button>`).join('')}
function setTab(g,el){tab=g;idx=0;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');mode==='cards'?renderCard():mode==='quiz'?startQuiz():renderMatch()}
function renderCard(){let arr=list(),v=arr[idx];document.getElementById('scene').classList.remove('flipped');document.getElementById('counter').textContent=`${idx+1} / ${arr.length}`;document.getElementById('word').textContent=v.w;document.getElementById('meaning').textContent=v.m;document.getElementById('note').textContent=v.n;document.getElementById('example').textContent=v.e;document.getElementById('prev').disabled=idx===0;document.getElementById('next').disabled=idx===arr.length-1;let f=document.getElementById('front'),b=document.getElementById('learnBtn');if(learned.has(v.id)){f.classList.add('learned');b.textContent='✗ Bỏ đánh dấu';b.className='learn yes'}else{f.classList.remove('learned');b.textContent='✓ Đã thuộc';b.className='learn'}}
function flipCard(){document.getElementById('scene').classList.toggle('flipped')}
function moveCard(d){let arr=list();idx=Math.max(0,Math.min(arr.length-1,idx+d));renderCard()}
function toggleLearned(){let v=list()[idx];learned.has(v.id)?learned.delete(v.id):learned.add(v.id);update();renderCard()}
function switchMode(m){mode=m;['cards','quiz','match'].forEach(x=>{document.getElementById(x).style.display=x===m?'block':'none';document.getElementById('btn'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active',x===m)});if(m==='cards')renderCard();if(m==='quiz')startQuiz();if(m==='match')renderMatch()}
function startQuiz(){let arr=shuffle(list());quiz=arr.map(v=>{let wrong=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3).map(x=>x.m);return{v,opts:shuffle([v.m,...wrong])}});qi=0;score=0;renderQ()}
function renderQ(){let qwrap=document.getElementById('quiz');if(qi>=quiz.length){let pct=Math.round(score/quiz.length*100);qwrap.innerHTML=`<div class="score"><h2>${pct>=80?'Tốt lắm 🎉':pct>=60?'Ổn rồi 👍':'Ôn lại thêm nhé 📚'}</h2><div class="score-num">${score}/${quiz.length}</div><p>Điểm: <b>${pct}%</b></p><button class="retry" onclick="startQuiz()">Làm lại</button></div>`;return}let q=quiz[qi];qwrap.innerHTML=`<div class="quiz-top"><span class="pill">${qi+1} / ${quiz.length}</span><span>Điểm: <b>${score}</b></span></div><div class="quiz-card"><div class="q-label">Chọn nghĩa đúng</div><div class="q-word">${q.v.w}</div><div class="q-example">${q.v.e}</div></div><div class="opts">${q.opts.map((o,i)=>`<button class="opt" onclick="pick(${i})">${o}</button>`).join('')}</div><div id="fb" class="feedback"></div><button id="qnext" class="next" onclick="qi++;renderQ()">${qi+1<quiz.length?'Câu tiếp →':'Xem kết quả →'}</button>`}
function pick(i){let q=quiz[qi],btns=[...document.querySelectorAll('.opt')],fb=document.getElementById('fb');btns.forEach(b=>b.disabled=true);if(q.opts[i]===q.v.m){btns[i].classList.add('correct');score++;learned.add(q.v.id);fb.className='feedback show correct';fb.innerHTML=`✓ Chính xác!<br><span style="font-weight:700">Ví dụ: ${q.v.e}</span>`}else{btns[i].classList.add('wrong');btns.forEach((b,j)=>{if(q.opts[j]===q.v.m)b.classList.add('correct')});fb.className='feedback show wrong';fb.innerHTML=`✗ Chưa đúng. Đáp án: <b>${q.v.m}</b><br><span style="font-weight:700">Ví dụ: ${q.v.e}</span>`}update();document.getElementById('qnext').classList.add('show')}
function renderMatch(){let arr=shuffle(list()).slice(0,10), words=shuffle(arr), meanings=shuffle(arr);selected=null;matched=0;document.getElementById('match').innerHTML=`<div class="match-card"><div class="match-title"><h3>Nối từ với nghĩa đúng</h3><p>Chọn 1 từ bên trái, sau đó chọn nghĩa tương ứng.</p></div><div class="grid"><div class="col">${words.map(v=>`<div class="item worditem" data-id="${v.id}" data-type="w" onclick="matchClick(this)">${v.w}</div>`).join('')}</div><div class="col">${meanings.map(v=>`<div class="item" data-id="${v.id}" data-type="m" onclick="matchClick(this)">${v.m}</div>`).join('')}</div></div><div id="done" class="match-complete">★ Hoàn thành! Bạn đã nối đúng tất cả.</div><div class="reset"><button onclick="renderMatch()">↺ Làm lại</button></div></div>`}
function matchClick(el){if(el.classList.contains('matched'))return;if(!selected){document.querySelectorAll('.item.selected').forEach(x=>x.classList.remove('selected'));selected=el;el.classList.add('selected');return}if(selected===el){el.classList.remove('selected');selected=null;return}let ok=selected.dataset.id===el.dataset.id&&selected.dataset.type!==el.dataset.type;if(ok){selected.classList.remove('selected');selected.classList.add('matched');el.classList.add('matched');learned.add(Number(el.dataset.id));matched++;update();if(matched===Math.min(10,list().length))document.getElementById('done').classList.add('show')}else{selected.classList.add('flash');el.classList.add('flash');let a=selected;setTimeout(()=>{a.classList.remove('flash','selected');el.classList.remove('flash')},450)}selected=null}
buildTabs();renderCard();update();
</script>
</body>
</html>
