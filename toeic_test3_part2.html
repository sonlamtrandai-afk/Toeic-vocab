<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>TOEIC Test 3 – Part 2</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #eef3f8;
    color: #1a2a3a;
    padding-bottom: 60px;
  }

  /* AUDIO */
  .audio-wrap {
    background: #1a2535;
    padding: 14px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .audio-wrap audio { width: 100%; height: 40px; }

  /* MAIN */
  .main { max-width: 700px; margin: 0 auto; padding: 32px 20px; }

  .part-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #3a5a7a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* QUESTION ROW */
  .q-row { margin-bottom: 20px; }

  .q-num {
    font-size: 1rem;
    font-weight: 600;
    color: #1a2a3a;
    margin-bottom: 10px;
  }

  .options-row {
    display: flex;
    gap: 32px;
    align-items: center;
    padding-left: 4px;
  }

  .radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 500;
    color: #1a2a3a;
    user-select: none;
  }

  .radio-label input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 2px solid #8aaac0;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .radio-label input[type="radio"]:checked {
    border-color: #2a6aad;
    background: #2a6aad;
    box-shadow: inset 0 0 0 3px #eef3f8;
  }

  /* After submit */
  .radio-label.correct-choice { color: #1a7a42; font-weight: 600; }
  .radio-label.correct-choice input[type="radio"] {
    border-color: #27ae60 !important;
    background: #27ae60 !important;
    box-shadow: inset 0 0 0 3px #eef3f8;
  }
  .radio-label.wrong-choice { color: #c02020; }
  .radio-label.wrong-choice input[type="radio"] {
    border-color: #e03030 !important;
    background: #e03030 !important;
    box-shadow: inset 0 0 0 3px #eef3f8;
  }
  .radio-label.show-correct { color: #1a7a42; font-weight: 600; }
  .radio-label.show-correct input[type="radio"] {
    border-color: #27ae60 !important;
    background: #27ae60 !important;
    box-shadow: inset 0 0 0 3px #eef3f8;
  }

  /* SCRIPT REVEAL */
  .script-box {
    display: none;
    margin-top: 12px;
    background: #fff;
    border-left: 4px solid #2a6aad;
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
  }
  .script-box.show { display: block; }

  .script-line { font-size: 0.9rem; line-height: 1.6; color: #1a2a3a; }
  .speaker { color: #2a6aad; font-weight: 600; }
  .script-vi { font-size: 0.85rem; color: #6a8aaa; font-style: italic; margin-top: 2px; margin-bottom: 8px; }

  .explain-box {
    margin-top: 10px;
    background: #fffbf0;
    border-left: 4px solid #f0a800;
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 0.87rem;
    line-height: 1.65;
    color: #5a4010;
  }
  .explain-box strong { color: #c07800; }

  .vocab-line {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #5a7a9a;
  }
  .vocab-line em { color: #2a6aad; font-style: normal; font-weight: 500; }

  .divider { border: none; border-top: 1px solid #ccd8e4; margin: 4px 0 20px; }

  /* SUBMIT */
  .submit-wrap { margin-top: 36px; text-align: center; }
  .btn-submit {
    background: #2a6aad;
    color: #fff;
    border: none;
    padding: 13px 44px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: #1a5090; }
  .btn-submit:disabled { background: #aabccc; cursor: default; }

  /* RESULT */
  #result-panel {
    display: none;
    margin-top: 36px;
    background: #fff;
    border: 2px solid #2a6aad;
    border-radius: 12px;
    padding: 28px 24px;
    text-align: center;
  }
  #result-panel.show { display: block; }
  #result-panel h2 { font-size: 1rem; color: #3a5a7a; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .score-big { font-size: 3rem; font-weight: 700; color: #1a2a3a; line-height: 1; }
  .score-big span { color: #2a6aad; font-size: 1.5rem; }
  #result-msg { margin-top: 12px; color: #5a7a9a; font-size: 0.95rem; }
</style>
</head>

  { num:7, ans:0, script:{q_en:"M-Au: Why is there no flour on the shelf?",q_vi:"Tại sao không có bột mì trên kệ?",a_en:"W-Br: (A) Because it's out of stock.",a_vi:"(A) Vì nó đã hết hàng rồi."}, explanation:"<strong>(A) ✓</strong> Câu hỏi <em>Why</em> → \"hết hàng\" trả lời trực tiếp lý do.<br>(B) Sai: \"roses\" bẫy phát âm flour ↔ flower.<br>(C) Sai: Why không trả lời bằng Yes/No.", vocab:"flour 밀가루 | shelf 선반 | out of stock 품절" },
  { num:8, ans:0, script:{q_en:"M-Au: When will the catering company arrive?",q_vi:"Công ty phục vụ ăn uống sẽ đến khi nào?",a_en:"W-Am: (A) At four o'clock.",a_vi:"(A) Lúc 4 giờ."}, explanation:"<strong>(A) ✓</strong> <em>When</em> → thời gian cụ thể \"At four o'clock\".<br>(B) Sai: \"delicious\" liên tưởng \"catering\".<br>(C) Sai: \"vegetarian\" liên tưởng \"catering\".", vocab:"catering 출장 연회 | vegetarian 채식주의자 | flavor 맛, 풍미" },

  { num:19, ans:0, script:{q_en:"M-Cn: There's a nice place to rent on Mercer Street.",q_vi:"Có một chỗ khá tốt để thuê trên phố Mercer.",a_en:"W-Am: (A) I just renewed my current lease.",a_vi:"(A) Tôi vừa gia hạn hợp đồng thuê hiện tại."}, explanation:"<strong>(A) ✓</strong> Vừa gia hạn hợp đồng → không cần chỗ mới → phản hồi hợp lý.<br>(B) Sai: \"great\" liên tưởng \"nice\".<br>(C) Sai: \"rental\" bẫy phái sinh từ \"rent\".", vocab:"rent 임대하다 | renew 갱신하다 | lease 임대차 계약 | rental application 임대 신청서" },

let submitted = false;

function renderQuiz() {
  const container = document.getElementById('quiz');
  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-row';
    div.id = `qrow-${i}`;
    div.innerHTML = `
      <div class="q-num">${i + 1}.</div>
      <div class="options-row">
        ${['A','B','C'].map((letter, j) => `
          <label class="radio-label" id="lbl-${i}-${j}">
            <input type="radio" name="q${i}" value="${j}"> ${letter}
          </label>`).join('')}
      </div>
      <div class="script-box" id="script-${i}">
        <div class="script-line"><span class="speaker">Q:</span> ${q.script.q_en}</div>
        <div class="script-vi">${q.script.q_vi}</div>
        <div class="script-line"><span class="speaker">A:</span> ${q.script.a_en}</div>
        <div class="script-vi">${q.script.a_vi}</div>
        <div class="vocab-line">📚 <em>Vocab:</em> ${q.vocab}</div>
        <div class="explain-box" style="margin-top:10px">${q.explanation}</div>
      </div>`;
    container.appendChild(div);
    if (i < questions.length - 1) {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      container.appendChild(hr);
    }
  });
}

function submitAll() {
  if (submitted) return;

  const unanswered = questions.filter((_, i) =>
    !Array.from(document.querySelectorAll(`input[name="q${i}"]`)).some(r => r.checked)
  ).length;

  if (unanswered > 0 && !confirm(`Bạn còn ${unanswered} câu chưa trả lời. Vẫn nộp bài?`)) return;

  submitted = true;
  document.getElementById('btn-submit').disabled = true;

  let correct = 0;
  questions.forEach((q, i) => {
    const radios = document.querySelectorAll(`input[name="q${i}"]`);
    let selected = null;
    radios.forEach((r, j) => { if (r.checked) selected = j; r.disabled = true; });

    for (let j = 0; j < 3; j++) {
      const lbl = document.getElementById(`lbl-${i}-${j}`);
      if (j === selected && selected === q.ans) { lbl.classList.add('correct-choice'); correct++; }
      else if (j === selected && selected !== q.ans) { lbl.classList.add('wrong-choice'); }
      else if (j === q.ans && selected !== q.ans) { lbl.classList.add('show-correct'); }
    }

    document.getElementById(`script-${i}`).classList.add('show');
  });

  const panel = document.getElementById('result-panel');
  panel.classList.add('show');
  document.getElementById('final-score').innerHTML = `${correct} <span>/ 25</span>`;
  const pct = Math.round(correct / 25 * 100);
  document.getElementById('result-msg').textContent =
    pct >= 88 ? '🏆 Xuất sắc! Gần như hoàn hảo!' :
    pct >= 72 ? '👍 Khá tốt! Ôn lại các câu sai nhé.' :
    pct >= 50 ? '📚 Cần luyện thêm – đọc kỹ phần giải thích!' :
    '💪 Hãy nghe lại audio và đọc script để nắm vững hơn.';
  panel.scrollIntoView({ behavior:'smooth', block:'center' });
}

renderQuiz();
</script>
</body>
</html>
